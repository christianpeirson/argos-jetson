<!doctype html>
<!-- fallow-ignore-file unresolved-import -->
<!--
  fallow's HTML parser flags <link href="/fonts/..."> as module imports,
  but they are runtime URL refs to static/fonts/* (served by SvelteKit's
  static adapter). The static/** dir is already in ignorePatterns, but
  fallow still walks app.html link tags and reports them as unresolved.
  File-wide suppression keeps app.html green without losing real coverage
  elsewhere.
-->
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<!-- Theme FOUC prevention — runs synchronously before first paint -->
		<script>
			try {
				var t = JSON.parse(localStorage.getItem('argos-theme') || '{}');
				if (t.palette) document.documentElement.dataset.palette = t.palette;
				// V3 (NVIDIA UI, :5175): stamp data-ui on <html> before first
				// paint so /dashboard/v3 routes theme correctly. Path-gated, so
				// inert on :5173 (V1) and :5174 (V2). C0 — V3 mirrors V1 (dark),
				// no canvas flash yet; C2 extends this with the NVIDIA light/dark
				// swap. <body> isn't parsed yet inside <head>, so the v3 layout
				// re-stamps data-ui onto <body> after hydration.
				if (location.pathname.startsWith('/dashboard/v3')) {
					var v3 = JSON.parse(localStorage.getItem('argos-v3-theme') || '{}');
					document.documentElement.dataset.ui = 'v3';
					if (v3.mode === 'dark' || v3.mode === 'light') {
						document.documentElement.dataset.mode = v3.mode;
					}
					if (typeof v3.palette === 'string' && v3.palette.length <= 32) {
						document.documentElement.dataset.palette = v3.palette;
					}
				}
			} catch (e) {
				/* dark class already set on <html> */
			}
		</script>
		<!-- Critical CSS - FOUC prevention only -->
		<style>
			body {
				background-color: #111111;
				color: #ffffff;
				font-family: 'Geist', system-ui, sans-serif;
			}
		</style>

		<!-- Geist Sans for UI navigation chrome -->
		<link rel="stylesheet" href="/fonts/geist.css" />
		<!-- FiraCode Nerd Font for terminal rendering with Nerd Font glyphs -->
		<link rel="stylesheet" href="/fonts/firacode-nerd-font.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
