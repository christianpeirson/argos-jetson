name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate PR commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — SHA-pinned per L3 audit canon
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Full history so commitlint can walk every commit in the PR range,
          # not just the synthetic merge commit.
          fetch-depth: 0
          persist-credentials: false
      - name: Validate all commits in PR
        # wagoid/commitlint-github-action v6.2.1 — SHA-pinned per L3 audit canon
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed
        with:
          configFile: commitlint.config.mjs
          # Match the exact rules enforced locally.
          failOnWarnings: false
          helpURL: https://github.com/conventional-changelog/commitlint#what-is-commitlint
