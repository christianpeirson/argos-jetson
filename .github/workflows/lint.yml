name: 'Lint: Cognitive Complexity & Code Quality Gate'

# Fast lint-only gate. Fires on every push and every PR (any branch).
# Hard-blocks merging into main if any check fails.
# The richer ci.yml (typecheck + tests + build) still runs on main.
#
# This workflow is the server-side backstop when `git commit --no-verify`
# bypasses husky: ESLint + Conventional Commits + secret scan.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Least-privilege default
permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: 'ESLint full-repo scan'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Checkout code'
        # actions/checkout v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: 'Setup Node.js'
        # actions/setup-node v4.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Restore ESLint cache'
        uses: actions/cache@v5
        with:
          path: .eslintcache
          # Invalidate whenever eslint config or deps change — otherwise
          # warm cache survives across CI runs on the same config.
          key: eslint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'config/eslint.config.js') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: 'ESLint full-repo scan (cognitive complexity ≤5)'
        # Matches the local pre-push gate: blocks any error including
        # sonarjs/cognitive-complexity, complexity (cyclomatic), and unused vars.
        # --cache makes re-runs on unchanged files near-instant.
        run: npx eslint . --config config/eslint.config.js --cache --cache-location .eslintcache --cache-strategy content

  # NOTE: commitlint job removed 2026-04-29 — was duplicate of dedicated
  # commitlint.yml workflow. Single-source-of-truth canon (PR-CI-2 audit).
  # commitlint.yml remains the canonical Conventional Commits gate.

  gitleaks:
    name: 'Secret scan (gitleaks)'
    # Backstops husky secret-scan when `--no-verify` was used locally
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Checkout code'
        # actions/checkout v4.2.2 — full history for diff scan
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 'gitleaks — detect hardcoded secrets'
        # gitleaks/gitleaks-action v2.3.9
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
