# .github/workflows/ci.yml

name: 'CI: Validate Code Quality'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default
# https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  contents: read

# Cancel in-progress runs on same ref — safe for validation-only workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 'Validate Code, Tests, and Build'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 'Checkout Code'
        # actions/checkout v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: 'Setup Node.js'
        # actions/setup-node v4.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm ci

      - name: 'Security Audit - Delta check against baseline'
        # Uses scripts/ops/audit-delta.sh to fail only on NEW advisories
        # (GHSA IDs not already in .audit-baseline.json). Pre-existing
        # advisories are tracked for coordinated Track-B remediation; the
        # per-PR CI shouldn't block on the same backlog every time.
        # To accept a current audit as the new baseline, a maintainer runs:
        #   scripts/ops/audit-delta.sh --update
        # locally and commits the updated .audit-baseline.json.
        run: ./scripts/ops/audit-delta.sh

      - name: 'Run Linting, Formatting, and Type Checks'
        run: |
          npm run lint
          npm run format:check
          npm run typecheck

      - name: 'Run Automated Tests'
        # `npm test` runs vitest in watch mode — wrong for CI. Use the
        # explicit unit scope. `--max-old-space-size=4096` prevents the
        # 7GB runner from OOMing during the full parallel suite
        # (svelte-check + vitest workers + test fixtures approach the
        # default 2GB V8 heap on this repo's ~511 tests).
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # CI-only placeholder. src/lib/server/env.ts rejects short keys
          # (min 32 chars via Zod). Not used for actual auth during CI
          # tests/build — those paths are mocked or don't reach the auth
          # middleware. 64 hex chars ensures the validator passes.
          ARGOS_API_KEY: ci-placeholder-do-not-use-for-auth-0000000000000000000000000000
        run: npm run test:unit

      - name: 'Verify Production Build'
        env:
          ARGOS_API_KEY: ci-placeholder-do-not-use-for-auth-0000000000000000000000000000
        run: npm run build
