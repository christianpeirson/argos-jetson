name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release in dry-run mode (no tag, no release, no commit-back)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Commits created by semantic-release land with a `[skip ci]` token in
    # the message body; avoid an infinite loop in case the check misfires.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write # create tag, push CHANGELOG commit
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so semantic-release can walk every commit since
          # the last tag. persist-credentials:false lets the git plugin
          # push via its own configured token.
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          # Intentionally no registry-url — Argos is private:true; we do
          # not publish to npm, and setting registry-url breaks
          # semantic-release token handling per its docs.
      - name: Install dependencies
        run: npm ci
      - name: Release (dry-run via workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run
      - name: Release (real)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
