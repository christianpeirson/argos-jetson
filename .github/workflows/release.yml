# .github/workflows/release.yml

name: 'CD: Create Release Package'

on:
  push:
    tags:
      - 'v*.*.*'

# Workflow default: read-only. Job-scoped write granted below.
permissions:
  contents: read

# DO NOT cancel release runs — aborting mid-upload leaves malformed releases.
# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: 'Build and Package Application'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Least-privilege — only this job needs write
    permissions:
      contents: write

    steps:
      - name: 'Checkout Code'
        # actions/checkout v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: 'Setup Node.js'
        # actions/setup-node v4.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install All Dependencies for Build'
        run: npm ci

      - name: 'Build Application for Production'
        run: npm run build

      - name: 'Assemble Clean Production Package'
        run: |
          mkdir release
          cp -r build/ release/
          cp package.json release/
          cd release
          npm ci --omit=dev
          cd ..

      - name: 'Create Compressed Release Tarball'
        # Move github.ref_name through env: to avoid actionlint-flagged
        # interpolation-into-run pattern (injection class).
        env:
          TAG: ${{ github.ref_name }}
        run: tar -czvf "argos-final-${TAG}.tar.gz" release

      - name: 'Create GitHub Release and Upload Artifact'
        # softprops/action-gh-release v3.0.0 — SHA-pinned. v1 deprecated (Node 16
        # EOL). Requires contents:write which is granted at job scope above.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        env:
          TAG: ${{ github.ref_name }}
        with:
          files: argos-final-${{ env.TAG }}.tar.gz
